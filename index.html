<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Passwort Schutz</title>
<style>
    body {
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        /* Animierter Hintergrund */
        background: linear-gradient(-45deg, #6a11cb, #2575fc, #11998e, #38ef7d);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        color: white;
    }
    @keyframes gradientBG {
        0% {background-position: 0% 50%;}
        50% {background-position: 100% 50%;}
        100% {background-position: 0% 50%;}
    }
    .container {
        background: rgba(0,0,0,0.6);
        padding: 30px 50px;
        border-radius: 15px;
        text-align: center;
        box-shadow: 0 0 20px rgba(0,0,0,0.4);
        max-width: 400px;
    }
    input[type="password"] {
        padding: 10px;
        width: 200px;
        margin-bottom: 10px;
        border-radius: 5px;
        border: none;
    }
    button {
        padding: 10px 20px;
        border-radius: 5px;
        border: none;
        background-color: #4CAF50;
        color: white;
        cursor: pointer;
    }
    button:hover {
        background-color: #45a049;
    }
    .message {
        margin-top: 15px;
        font-weight: bold;
    }
    .countdown {
        margin-top: 10px;
        color: yellow;
        font-weight: bold;
    }
</style>
</head>
<body>
<div class="container">
    <h2>Passwort eingeben</h2>
    <input type="password" id="passwordInput" placeholder="Passwort">
    <br>
    <button onclick="checkPassword()">Überprüfen</button>
    <div class="message" id="message"></div>
    <div class="countdown" id="countdown"></div>
    <div class="success" id="success"></div>
</div>

<script>
let attempts = 0;
let blocked = false;
let countdownInterval;

function checkPassword() {
    if(blocked) return;

    const password = document.getElementById('passwordInput').value;
    const message = document.getElementById('message');
    const countdownElem = document.getElementById('countdown');
    const successElem = document.getElementById('success');

    if(password === 'Passwort') {
        // Richtiges Passwort -> Erfolg auf derselben Seite
        successElem.textContent = 'Du hast das richtige Passwort eingegeben!';
        successElem.style.color = 'lightgreen';
        message.textContent = '';
        countdownElem.textContent = '';
    } else {
        attempts++;
        successElem.textContent = '';
        if(attempts >= 10) {
            blocked = true;
            message.textContent = 'Zu viele Versuche. Bitte warten...';
            message.style.color = 'red';
            let timeLeft = 30; // 30 Sekunden Sperre
            countdownElem.textContent = `Noch ${timeLeft} Sekunden warten.`;
            
            countdownInterval = setInterval(() => {
                timeLeft--;
                countdownElem.textContent = `Noch ${timeLeft} Sekunden warten.`;
                if(timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    attempts = 0;
                    blocked = false;
                    message.textContent = '';
                    countdownElem.textContent = '';
                }
            }, 1000);
        } else {
            message.textContent = `Falsches Passwort. Versuch ${attempts}/10.`;
            message.style.color = 'red';
        }
    }
}
</script>
</body>
</html>
