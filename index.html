<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Passwort Schutz</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(-45deg, #6a11cb, #2575fc, #11998e, #38ef7d);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    color: white;
}
@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}
.container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
}
input[type="password"] {
    padding: 10px;
    width: 200px;
    margin-bottom: 10px;
    border-radius: 5px;
    border: none;
}
button {
    padding: 10px 20px;
    border-radius: 5px;
    border: none;
    background-color: #4CAF50;
    color: white;
    cursor: pointer;
}
button:hover {
    background-color: #45a049;
}
.message {
    margin-top: 15px;
    font-weight: bold;
}
.countdown {
    margin-top: 10px;
    color: yellow;
    font-weight: bold;
}
/* Vollbild-Erfolgsbox */
.success-box {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: white;
    color: black;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    font-weight: bold;
    text-align: center;
    z-index: 1; /* Konfetti wird über der Box angezeigt */
    overflow: hidden;
}
/* Konfetti */
.confetti {
    position: absolute;
    top: -10px;
    z-index: 2; /* über der Box sichtbar */
    pointer-events: none;
    opacity: 0.9;
}
</style>
</head>
<body>
<div class="container">
    <h2>Passwort eingeben</h2>
    <input type="password" id="passwordInput" placeholder="Passwort">
    <br>
    <button onclick="checkPassword()">Überprüfen</button>
    <div class="message" id="message"></div>
    <div class="countdown" id="countdown"></div>
</div>

<!-- Vollbild-Erfolgsbox -->
<div class="success-box" id="successBox">
    Du hast das richtige Passwort eingegeben!
</div>

<script>
let attempts = 0;
let blocked = false;
let countdownInterval;

function checkPassword() {
    if(blocked) return;

    const password = document.getElementById('passwordInput').value;
    const message = document.getElementById('message');
    const countdownElem = document.getElementById('countdown');
    const successBox = document.getElementById('successBox');

    if(password === 'Passwort') {
        // Box anzeigen
        successBox.style.display = 'flex';
        message.textContent = '';
        countdownElem.textContent = '';
        launchConfetti();
    } else {
        attempts++;
        successBox.style.display = 'none';
        if(attempts >= 10) {
            blocked = true;
            message.textContent = 'Zu viele Versuche. Bitte warten...';
            message.style.color = 'red';
            let timeLeft = 30;
            countdownElem.textContent = `Noch ${timeLeft} Sekunden warten.`;
            
            countdownInterval = setInterval(() => {
                timeLeft--;
                countdownElem.textContent = `Noch ${timeLeft} Sekunden warten.`;
                if(timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    attempts = 0;
                    blocked = false;
                    message.textContent = '';
                    countdownElem.textContent = '';
                }
            }, 1000);
        } else {
            message.textContent = `Falsches Passwort. Versuch ${attempts}/10.`;
            message.style.color = 'red';
        }
    }
}

// Konfetti-Funktion (realistisch)
function launchConfetti() {
    const colors = ['#FF595E','#FFCA3A','#8AC926','#1982C4','#6A4C93'];
    const shapes = ['circle', 'square', 'triangle'];

    for(let i = 0; i < 150; i++) {
        const confetti = document.createElement('div');
        confetti.classList.add('confetti');
        confetti.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];

        // Form
        const shape = shapes[Math.floor(Math.random()*shapes.length)];
        if(shape === 'circle') confetti.style.borderRadius = '50%';
        if(shape === 'triangle') {
            confetti.style.width = '0';
            confetti.style.height = '0';
            confetti.style.borderLeft = '6px solid transparent';
            confetti.style.borderRight = '6px solid transparent';
            confetti.style.borderBottom = `12px solid ${confetti.style.backgroundColor}`;
            confetti.style.backgroundColor = 'transparent';
        }

        // Größe
        const size = Math.random() * 8 + 4;
        if(shape !== 'triangle') {
            confetti.style.width = size + 'px';
            confetti.style.height = size + 'px';
        }

        confetti.style.left = Math.random() * window.innerWidth + 'px';
        document.body.appendChild(confetti);

        // Bewegung
        const duration = Math.random() * 3 + 3;
        const horizontalShift = (Math.random() - 0.5) * 200;

        confetti.animate([
            { transform: `translate(0px,0px) rotate(0deg)` },
            { transform: `translate(${horizontalShift}px, ${window.innerHeight + 50}px) rotate(${Math.random()*720}deg)` }
        ], {
            duration: duration * 1000,
            easing: 'ease-out'
        });

        setTimeout(() => {
            confetti.remove();
        }, duration*1000);
    }
}
</script>
</body>
</html>
