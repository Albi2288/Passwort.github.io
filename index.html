<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passwort Überprüfung</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        .container {
            background-color: #fff;
            padding: 20px 40px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            text-align: center;
        }
        input[type="password"] {
            padding: 10px;
            width: 200px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .message {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Passwort eingeben</h2>
        <input type="password" id="passwordInput" placeholder="Passwort">
        <br>
        <button onclick="checkPassword()">Überprüfen</button>
        <div class="message" id="message"></div>
    </div>

    <script>
        function checkPassword() {
            const password = document.getElementById('passwordInput').value;
            const message = document.getElementById('message');
            
            if(password === 'Passwort') {
                message.textContent = 'Du hast das richtige Passwort eingegeben.';
                message.style.color = 'green';
            } else {
                message.textContent = 'Falsches Passwort. Versuch es nochmal.';
                message.style.color = 'red';
            }
        }
    </script>
</body>
</html>
